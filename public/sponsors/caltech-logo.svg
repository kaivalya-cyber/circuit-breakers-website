<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160">
  <defs>
    <linearGradient id="bg-caltech" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6C0C;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#76777B;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="shimmer-caltech" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="160" rx="12" fill="url(#bg-caltech)"/>
  <rect x="2" y="2" width="396" height="156" rx="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <rect y="120" width="400" height="40" fill="url(#shimmer-caltech)" opacity="0.5"/>
  <text x="200" y="65" font-family="system-ui,-apple-system,sans-serif" font-size="32" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">Caltech</text>
  <text x="200" y="100" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle" opacity="0.7" letter-spacing="1">SPONSOR</text>
</svg>